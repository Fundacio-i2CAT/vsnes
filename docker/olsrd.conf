# OLSRd configuration for the VSNES satellite mesh.
#
# Tuned for LEO ISL characteristics:
#   - ISLs last minutes (not seconds), so HELLO/TC intervals are relaxed
#     to cut protocol overhead without losing neighbour state.
#   - ValidityTimes are set to comfortably exceed the worst-case shaped RTT
#     (currently tens of ms) so stable links never expire prematurely.
#   - LinkQualityFishEye 1 scales TC flooding: near neighbours get frequent
#     TCs, far nodes infrequent — important at constellation scale.
#   - LinkQualityWinSize 100 smooths the ETX estimate on stable ISLs.
#   - MprCoverage 2 keeps one redundant MPR for resilience at link-down edges.
#
# Inspect at runtime:
#   echo /neigh | nc 127.0.0.1 2006
#   echo /topo  | nc 127.0.0.1 2006
#   echo /routes | nc 127.0.0.1 2006

DebugLevel  0
IpVersion   4

# Link-quality settings
LinkQualityAlgorithm  "etx_ff"
LinkQualityFishEye    1
LinkQualityWinSize    100

# MPR redundancy (1 = standard, 2 = one extra MPR per covered node)
MprCoverage           2

# Plugin filename is versioned by the build; routing-ctl auto-detects the
# actual olsrd_txtinfo.so.* at start time and rewrites this LoadPlugin line.
LoadPlugin "olsrd_txtinfo.so.1.1"
{
    PlParam "accept" "0.0.0.0"
}

Interface "eth0"
{
    # HELLO: detect neighbour loss within ~9 s (3x interval).
    # ISLs are stable for minutes, so 3 s is conservative enough.
    HelloInterval       3.0
    HelloValidityTime   30.0   # >> max shaped RTT; prevents false expiry

    # TC: topology flood every 5 s; validity gives 3 windows of tolerance.
    TcInterval          5.0
    TcValidityTime      45.0
}
