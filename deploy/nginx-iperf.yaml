# nginx-iperf — web page (:80) + iperf3 server (:5201), exposed via NodePort.
#
# Deploy to a satellite's k3s cluster (e.g. SAT-1's uniq cluster):
#   docker cp deploy/nginx-iperf.yaml SAT-1:/tmp/nginx-iperf.yaml
#   docker exec SAT-1 k3s kubectl apply -f /tmp/nginx-iperf.yaml
#
# Then from the ground station (Ibi_ES, 172.27.12.201):
#   curl http://<node-ip>:30080            # web page
#   iperf3 -c <node-ip> -p 30201           # throughput
#
# <node-ip> is the satellite's 172.27.x address (e.g. SAT-1 = 172.27.12.101).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-iperf
  labels:
    app: nginx-iperf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-iperf
  template:
    metadata:
      labels:
        app: nginx-iperf
    spec:
      containers:
        - name: nginx-iperf
          # Pulled through the docker.io mirror (registries.yaml routes docker.io
          # to http://172.27.12.200:5000). Referencing the registry host directly
          # (172.27.12.200:5000/...) fails because containerd then uses HTTPS
          # against the HTTP-only registry. The image is stored under the repo
          # path "vsnes/nginx-iperf", which the mirror resolves over HTTP.
          image: docker.io/vsnes/nginx-iperf:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
            - name: iperf
              containerPort: 5201
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-iperf
spec:
  type: NodePort
  selector:
    app: nginx-iperf
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: iperf
      protocol: TCP
      port: 5201
      targetPort: 5201
      nodePort: 30201
