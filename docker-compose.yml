  # Shared OCI registry — all satellites pull from here (airgap / fast pull)
  # Reachable inside the vsnes_net at 172.27.12.200:5000
  # and from the WSL/host at localhost:5000 via the port mapping below.
  registry:
    image: registry:2
    container_name: vsnes-registry
    ports:
      - "5001:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      vsnes:
        ipv4_address: 172.27.12.200
    restart: unless-stopped

volumes:
  k3s-data-1:
  k3s-data-2:
  k3s-data-3:
  k3s-data-4:
  k3s-data-5:
  k3s-data-6:
