  k3s-data-10:
  k3s-data-11:
  k3s-data-12:
  k3s-data-ibi:
  k3s-data-foggia:
  registry-data:

networks:
  vsnes:
    name: vsnes_net
    driver: bridge
    # IPv6 link-local is required by babeld's wire protocol (it carries IPv4
    # routes but peers over fe80::). The ULA subnet is unused by the IPv4 sim/tc.
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.27.12.0/24
        - subnet: fd00:c0de:12::/64
